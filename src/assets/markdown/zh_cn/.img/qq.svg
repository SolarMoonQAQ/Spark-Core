<svg xmlns="http://www.w3.org/2000/svg" width="109" height="20" role="img" aria-label="加入QQ群">
    <!-- 标题（无障碍/悬停提示） -->
    <title>加入QQ群</title>

    <!-- 渐变定义：用于顶部高光效果 -->
    <linearGradient id="s" x2="0" y2="100%">
        <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
        <stop offset="1" stop-opacity=".1"/>
    </linearGradient>

    <!-- 圆角裁切路径 -->
    <clipPath id="r">
        <rect width="109" height="20" rx="3" fill="#fff"/>
    </clipPath>

    <!-- 背景矩形组（应用圆角裁切） -->
    <g clip-path="url(#r)">
        <!-- 左侧矩形（图标背景） -->
        <rect width="24" height="20" fill="white"/>
        <!-- 右侧矩形（文字背景） -->
        <rect x="24" width="85" height="20" fill="#black"/>
        <!-- 覆盖整个徽章的渐变高光 -->
        <rect width="109" height="20" fill="url(#s)"/>
    </g>

    <!-- 图标与文字组 -->
    <g fill="#fff"
       text-anchor="middle"
       font-family="Verdana,Geneva,DejaVu Sans,sans-serif"
       text-rendering="geometricPrecision"
       font-size="110">

        <!-- 左侧图标（嵌入的 PNG，Base64 编码） -->
        <image x="5" y="3" width="14" height="14"
               href="data:image/png;base64,"/>

        <!-- 右侧文字阴影（深色，稍微偏移） -->
        <text aria-hidden="true"
              x="655" y="150"
              fill="#010101" fill-opacity=".3"
              transform="scale(.1)"
              textLength="600">加入QQ群</text>

        <!-- 右侧文字本体（白色） -->
        <text x="655" y="140"
              transform="scale(.1)"
              fill="#fff"
              textLength="600">加入QQ群</text>
    </g>
</svg>
